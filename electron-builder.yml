appId: com.dailyupdatetracker.app
productName: Daily Update Tracker

files:
  - main.js
  - preload.js
  - renderer/**
  - db/**
  - build/**
  - node_modules/**
  - package.json

# Don't attempt code signing (no Apple certificate)
mac:
  identity: null
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64

linux:
  category: Utility
  icon: build/icons
  target:
    - target: deb
      arch: x64

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0
    - libasound2

# Silence publish — no auto-update configured
publish: null
